name: IranYTDL - Download from YT or direct link

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'Space-separated list of URLs to download (YouTube, direct links, etc.)'
        required: true
        type: string
      mode:
        description: 'Download mode'
        required: false
        default: 'normal'
        type: choice
        options:
          - normal
          - zip
      split_threshold_mb:
        description: 'Split files larger than this MB (0 = never split)'
        required: false
        default: 90
        type: number
      youtube_format:
        description: 'YouTube quality (best/bestvideo+bestaudio/bestaudio/worst)'
        required: false
        default: 'best'
        type: string
      bypass_method:
        description: 'YouTube bypass method'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto
          - cookiefile
          - oauth2
          - anonymous
          - extractor_args

jobs:
  save-file:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install aria2, zip, and yt-dlp
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 zip ffmpeg python3-pip
          pip3 install yt-dlp --break-system-packages || pip3 install yt-dlp

      - name: Setup YouTube cookies (optional)
        run: |
          # Check if cookies.txt is stored in repo secrets
          if [ -n "${{ secrets.YT_COOKIES }}" ]; then
            echo "${{ secrets.YT_COOKIES }}" > cookies.txt
            echo "✅ Cookies file loaded from secrets"
          elif [ -n "${{ secrets.YT_COOKIES_BASE64 }}" ]; then
            echo "${{ secrets.YT_COOKIES_BASE64 }}" | base64 -d > cookies.txt
            echo "✅ Cookies file loaded from base64 secrets"
          else
            echo "⚠️ No cookies found in secrets, using anonymous mode"
          fi

      - name: AVASAM Downloader - https://avasam.ir
        run: |
          echo "🏷️  AVASAM - Your Download Solution"
          echo "🌐 https://avasam.ir"
          echo ""

      - name: Download files (including YouTube with bypass)
        run: |
          MODE="${{ github.event.inputs.mode }}"
          URLS="${{ github.event.inputs.urls }}"
          SPLIT_THRESHOLD_MB="${{ github.event.inputs.split_threshold_mb }}"
          YT_FORMAT="${{ github.event.inputs.youtube_format }}"
          BYPASS_METHOD="${{ github.event.inputs.bypass_method }}"
          SPLIT_THRESHOLD_BYTES=$(( SPLIT_THRESHOLD_MB * 1024 * 1024 ))

          echo "🏷️  AVASAM (https://avasam.ir) - Downloading with mode: $MODE"
          echo "Split threshold: $SPLIT_THRESHOLD_MB MB"
          echo "YouTube format: $YT_FORMAT"
          echo "Bypass method: $BYPASS_METHOD"

          mkdir -p downloads tmp_downloads

          # Build yt-dlp command with bypass methods
          build_ytdlp_cmd() {
            local url="$1"
            local output="$2"
            local cmd="yt-dlp"
            
            # Add format
            cmd="$cmd -f \"$YT_FORMAT\""
            
            # Add merge output format
            cmd="$cmd --merge-output-format mkv"
            
            # Add output template
            cmd="$cmd -o \"$output\""
            
            # Add bypass methods based on selection
            case "$BYPASS_METHOD" in
              cookiefile)
                if [ -f "cookies.txt" ]; then
                  cmd="$cmd --cookies cookies.txt"
                else
                  cmd="$cmd --extractor-args \"youtube:skip=webpage\""
                fi
                ;;
              oauth2)
                cmd="$cmd --username \"oauth2\" --password \"\""
                ;;
              anonymous)
                cmd="$cmd --extractor-args \"youtube:player_client=android,web\""
                ;;
              extractor_args)
                cmd="$cmd --extractor-args \"youtube:skip=hls,dash,webpage;youtube:player_client=android,ios,web\""
                ;;
              auto)
                # Try multiple methods automatically
                if [ -f "cookies.txt" ]; then
                  cmd="$cmd --cookies cookies.txt"
                else
                  cmd="$cmd --extractor-args \"youtube:player_client=android,web\""
                fi
                ;;
            esac
            
            # Add more bypass options
            cmd="$cmd --no-check-certificate"
            cmd="$cmd --geo-bypass"
            cmd="$cmd --sleep-requests 1"
            cmd="$cmd --sleep-interval 2"
            cmd="$cmd --max-sleep-interval 5"
            cmd="$cmd --retries 10"
            cmd="$cmd --fragment-retries 10"
            
            echo "$cmd"
          }

          # Download each URL
          for URL in $URLS; do
            echo "⬇️ Processing: $URL"
            
            # Check if it's a YouTube URL
            if [[ "$URL" =~ (youtube\.com|youtu\.be) ]]; then
              echo "🎬 YouTube detected! Using yt-dlp with bypass method: $BYPASS_METHOD"
              cd tmp_downloads
              
              # Try primary method
              YTDLP_CMD=$(build_ytdlp_cmd "$URL" "%(title)s.%(ext)s")
              echo "Running: $YTDLP_CMD"
              
              eval $YTDLP_CMD "$URL" 2>&1 | tee download.log
              
              # If failed, try fallback methods
              if [ ${PIPESTATUS[0]} -ne 0 ]; then
                echo "⚠️ Primary method failed, trying fallback methods..."
                
                # Fallback 1: Use Android client
                echo "🔄 Fallback 1: Android client"
                yt-dlp -f "$YT_FORMAT" \
                  --extractor-args "youtube:player_client=android" \
                  --merge-output-format mkv \
                  --retries 10 \
                  --no-check-certificate \
                  -o "%(title)s.%(ext)s" \
                  "$URL"
                
                # Fallback 2: Use cookies if available
                if [ $? -ne 0 ] && [ -f "../cookies.txt" ]; then
                  echo "🔄 Fallback 2: Using cookies file"
                  yt-dlp -f "$YT_FORMAT" \
                    --cookies "../cookies.txt" \
                    --merge-output-format mkv \
                    --retries 10 \
                    -o "%(title)s.%(ext)s" \
                    "$URL"
                fi
                
                # Fallback 3: Audio only (if video fails)
                if [ $? -ne 0 ]; then
                  echo "🔄 Fallback 3: Trying audio only"
                  yt-dlp -f "bestaudio" \
                    --extract-audio \
                    --audio-format mp3 \
                    --retries 10 \
                    -o "%(title)s.%(ext)s" \
                    "$URL"
                fi
              fi
              
              cd ..
            else
              # Regular direct download
              FILENAME=$(basename "$URL")
              echo "📁 Direct download: $FILENAME"
              aria2c \
                --split=2 \
                --max-connection-per-server=2 \
                --min-split-size=90M \
                --dir="tmp_downloads" \
                --out="$FILENAME" \
                "$URL"
            fi
          done

          # Create .download_log for debugging
          if [ -f "tmp_downloads/download.log" ]; then
            cp tmp_downloads/download.log downloads/download_debug.log
          fi

          # Zip all downloads if mode is 'zip'
          if [ "$MODE" = "zip" ]; then
            ARCHIVE_NAME="downloads/archive_$(date +%Y%m%d_%H%M%S).zip"
            echo "📦 Creating zip archive: $ARCHIVE_NAME"
            zip -j "$ARCHIVE_NAME" tmp_downloads/* 2>/dev/null || true
            rm -rf tmp_downloads
          else
            # Normal mode: handle splitting large files
            for FILE in tmp_downloads/*; do
              [ -f "$FILE" ] || continue
              # Skip log files for splitting
              [[ "$FILE" == *".log" ]] && continue
              
              SIZE=$(stat -c%s "$FILE" 2>/dev/null || echo "0")
              BASENAME=$(basename "$FILE")

              if [ "$SPLIT_THRESHOLD_BYTES" -gt 0 ] && [ "$SIZE" -gt "$SPLIT_THRESHOLD_BYTES" ]; then
                echo "✂️ $BASENAME is $(( SIZE / 1024 / 1024 ))MB — splitting"
                zip -0 -s "${SPLIT_THRESHOLD_MB}m" "downloads/${BASENAME}.zip" -j "$FILE"
              else
                cp "$FILE" "downloads/$BASENAME"
              fi
            done
            rm -rf tmp_downloads
          fi

      - name: Commit & Push in batches of 5 files (AVASAM)
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          echo "🏷️  AVASAM (https://avasam.ir) - Preparing to commit files"

          # Collect all new/modified files under downloads/
          mapfile -t ALL_FILES < <(git ls-files --others --modified --exclude-standard downloads/ 2>/dev/null || find downloads -type f -not -path "*/\.*" 2>/dev/null)

          TOTAL=${#ALL_FILES[@]}
          echo "📦 Total files to push: $TOTAL"

          if [ "$TOTAL" -eq 0 ]; then
            echo "Nothing to commit"
            exit 0
          fi

          # Add all files
          git add downloads/
          
          # Commit all at once (simpler, avoids rebase conflicts)
          git commit -m "[AVASAM] Add downloaded files [skip ci]" || echo "No changes to commit"
          
          # Push with force-with-lease to avoid conflicts
          git pull --rebase origin "$BRANCH" || true
          git push origin HEAD:"$BRANCH" || git push --force-with-lease origin HEAD:"$BRANCH"

          echo "🎉 All $TOTAL files pushed — AVASAM (https://avasam.ir)"m "[AVASAM] Downloaded content [skip ci]" || echo "No changes"
            git pull --rebase origin ${GITHUB_REF_NAME} || true
            git push origin HEAD:${GITHUB_REF_NAME} --force-with-lease
            echo "✅ Pushed to repository"
          else
            echo "ℹ️ No files to commit"
          fi
